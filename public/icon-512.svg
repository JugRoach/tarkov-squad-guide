<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Dark rounded-square background (app icon shape) -->
  <rect width="512" height="512" rx="76" fill="#0d0e10"/>

  <!-- Notebook, slight left tilt so it reads as a book -->
  <g transform="rotate(-5 256 256)">
    <!-- Drop shadow -->
    <rect x="108" y="100" width="296" height="340" rx="18" fill="#000" opacity="0.45" transform="translate(8 10)"/>

    <!-- Cover -->
    <rect x="108" y="100" width="296" height="340" rx="18" fill="#1a1917" stroke="#d2af78" stroke-width="8"/>

    <!-- Top-edge paper sliver (3D hint) -->
    <rect x="115" y="100" width="282" height="10" fill="#3d3930"/>

    <!-- Spiral binding rings at the top edge -->
    <g fill="none" stroke="#d2af78" stroke-width="5">
      <circle cx="158" cy="100" r="11"/>
      <circle cx="207" cy="100" r="11"/>
      <circle cx="256" cy="100" r="11"/>
      <circle cx="305" cy="100" r="11"/>
      <circle cx="354" cy="100" r="11"/>
    </g>

    <!-- Big bold T on the cover -->
    <text x="256" y="370"
          text-anchor="middle"
          font-family="Impact, 'Arial Black', sans-serif"
          font-weight="900"
          font-size="260"
          fill="#d2af78">T</text>
  </g>
</svg>
